<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas Quiz - Aventura en Familia</title>
    <link rel="stylesheet" href="banderasJuego.css">
</head>
<body>
    <div class="game-container">
        <div id="setup-screen" class="quiz-card">
            <h2 class="title-main">✨ ¡Aprender es una Aventura!</h2>
            <p class="subtitle">Elige tu equipo de exploradores:</p>
            
            <div class="setup-group">
                <select id="gameMode" class="nav-select main-select">
                    <option value="1">1 Explorador</option>
                    <option value="2">Duo de Exploradores</option>
                    <option value="3" selected>Equipo de 3 Exploradores</option>
                </select>
            </div>

            <div class="names-grid" id="names-container">
                <div class="input-wrapper">
                    <label>Explorador 1</label>
                    <input type="text" id="p1-name" placeholder="Escribe nombre..." value="Nicole">
                </div>
                <div class="input-wrapper">
                    <label>Explorador 2</label>
                    <input type="text" id="p2-name" placeholder="Escribe nombre..." value="Nidia">
                </div>
                <div class="input-wrapper">
                    <label>Explorador 3</label>
                    <input type="text" id="p3-name" placeholder="Escribe nombre..." value="Franklin">
                </div>
            </div>

            <button id="start-game-btn" class="btn-primary">¡Empezar a Descubrir!</button>

            <div class="data-footer">
                <p>Gestión de Datos (Portable)</p>
                <div class="data-btns">
                    <button onclick="saveGame()" class="btn-data save">💾 Guardar</button>
                    <button onclick="clearStatsOnly()" class="btn-data warn">📊 Limpiar Puntos</button>
                    <button onclick="resetEverything()" class="btn-data danger">🗑️ Borrar Todo</button>
                </div>
                <div id="save-status"></div>
            </div>
        </div>

        <div id="game-screen" style="display: none;">
            <div class="game-nav">
                <button onclick="window.location.href='paises.html'" class="btn-nav">🌍 Mapa</button>
                <button onclick="showStats()" class="btn-nav stats-btn">📈 Progreso</button>
            </div>

            <div id="scoreboard" class="scoreboard"></div>

            <div class="quiz-card game-box">
                <div class="flag-frame">
                    <img id="flag-img" src="" alt="Bandera">
                </div>
                <h2 id="question-text">¿Qué país estamos conociendo?</h2>
                <div id="options-grid" class="options-grid"></div>
                <div id="feedback" class="feedback-area"></div>
                <button id="next-btn" class="btn-primary next-round" style="display: none;">Siguiente Bandera ✨</button>
            </div>
        </div>

        <div id="stats-modal" class="modal" style="display:none;">
            <div class="modal-content">
                <h3>🌟 Camino al Aprendizaje</h3>
                <div id="stats-body"></div>
                <button onclick="closeStats()" class="btn-primary">¡Seguir Explorando!</button>
            </div>
        </div>
    </div>
    <script src="banderasJuego.js"></script>
</body>
</html>
