<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Socrateka Atlas</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <style>
    html, body { margin:0; padding:0; height:100%; font-family: Arial, sans-serif; }
    #map { width:100%; height:100vh; }
    .controls {
      position:absolute; top:12px; left:12px; z-index:1000; width:340px;
      background:rgba(255,255,255,.95); border-radius:16px; box-shadow:0 4px 18px rgba(0,0,0,.18);
      padding:14px;
    }
    .controls button {
      width:100%; margin-bottom:10px; padding:12px 14px; border:0; border-radius:10px;
      background:#2d6cdf; color:white; font-weight:700; cursor:pointer; font-size:15px;
    }
    .controls button:last-of-type { margin-bottom:8px; }
    .controls button:hover { background:#1f5bc5; }
    .hint { color:#666; font-size:12px; line-height:1.35; }
    .country-label, .capital-label {
      background: transparent; border: none; box-shadow:none; white-space:nowrap;
      font-weight:700; text-shadow: 0 0 3px #fff, 1px 1px 1px #fff, -1px -1px 1px #fff;
    }
    .country-label { color:#111; font-size:11px; }
    .capital-label { color:#a80000; font-size:11px; }
    .popup-country { min-width:230px; line-height:1.4; }
    .popup-title { display:flex; align-items:center; gap:8px; font-weight:700; font-size:16px; margin-bottom:8px; }
    .popup-title img { width:36px; height:auto; border:1px solid #ccc; }
    .popup-grid { display:grid; grid-template-columns:auto 1fr; gap:4px 8px; }
    .capital-dot {
      width:10px; height:10px; border-radius:50%; background:#ff3b3b; border:2px solid #fff;
      box-shadow:0 0 4px rgba(0,0,0,.45);
    }
    .error-box {
      position:absolute; right:12px; top:12px; z-index:1100; display:none;
      max-width:360px; background:#fff1f0; color:#8a1f11; border:1px solid #ffc9c2;
      border-radius:10px; padding:10px 12px; box-shadow:0 2px 10px rgba(0,0,0,.12);
      font-size:14px;
    }
  </style>
</head>
<body>
  <div class="controls">
    <button id="resetBtn">Reset</button>
    <button id="toggleNamesBtn">Mostrar nombres de países</button>
    <button id="toggleCapitalsBtn">Mostrar capitales</button>
    <div class="hint">Hover: resaltar país · Click en país o punto rojo: ver información</div>
  </div>
  <div id="errorBox" class="error-box"></div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="./app.js"></script>
</body>
</html>
