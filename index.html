<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sokrateka</title>
    <link rel="stylesheet" href="style_portal.css">
</head>
<body>
    <button id="btn-abrir" class="btn-float" style="display: none;">☰</button>

    <div id="contenedor-principal" class="menu-activo">
        <aside id="sidebar-menu">
            <div class="sidebar-card">
                <div class="header-nav">
                    <h2>🎓 Sokrateka</h2>
                    <button id="btn-cerrar">✖</button>
                </div>
                
                <nav>
                    <p class="seccion">CONFIGURACIÓN GLOBAL</p>
                    <select id="global-lang" class="portal-select" onchange="actualizarIdiomaGlobal(this.value)">
                        <option value="es">Español 🇪🇸</option>
                        <option value="en">English 🇺🇸</option>
                    </select>

                    <p class="seccion">GEOGRAFÍA</p>
                    <button onclick="ir('Atlas/paises.html')">🌍 Mapa Atlas</button>
                    <button onclick="ir('Atlas/banderasJuego.html')">🚩 Juego Banderas</button>

                    <p class="seccion">MATEMÁTICAS</p>
                    <button onclick="enConstruccion()">📐 Pitágoras</button>
                </nav>
            </div>
        </aside>

        <main id="contenido-app">
            <iframe id="visor" src="Atlas/paises.html" frameborder="0"></iframe>
        </main>
    </div>

    <script>
        const contenedor = document.getElementById('contenedor-principal');
        const visor = document.getElementById('visor');
        const btnCerrar = document.getElementById('btn-cerrar');
        const btnAbrir = document.getElementById('btn-abrir');

        function ir(url) {
            visor.src = url;
            // Al cargar, enviamos el idioma actual para sincronizar
            visor.onload = () => actualizarIdiomaGlobal(document.getElementById('global-lang').value);
        }

        function actualizarIdiomaGlobal(lang) {
            visor.contentWindow.postMessage({ tipo: 'SET_LANGUAGE', lang: lang }, '*');
        }

        function enConstruccion() {
            const html = `<html><body style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100vh;font-family:sans-serif;background:#f0f2f5;color:#636e72;"><h1>🚧</h1><h2>Pitágoras</h2><p>Página en construcción</p></body></html>`;
            visor.src = URL.createObjectURL(new Blob([html], { type: 'text/html' }));
        }

        btnCerrar.onclick = () => { contenedor.classList.replace('menu-activo', 'menu-oculto'); btnAbrir.style.display = 'block'; };
        btnAbrir.onclick = () => { contenedor.classList.replace('menu-oculto', 'menu-activo'); btnAbrir.style.display = 'none'; };
    </script>
</body>
</html>
