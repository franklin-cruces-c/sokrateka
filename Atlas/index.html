<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Global Interactive Map</title>
    <link rel="stylesheet" href="style_mapa.css">
</head>
<body>
    <div id="map-actions">
        <button id="btn-reset" onclick="resetWorld()">Reiniciar Mundo</button>
        <button id="btn-names" onclick="toggleNames()">Mostrar Nombres</button>
    </div>

    <div id="map"></div>

    <script>
        const i18n = {
            es: { reset: "Reiniciar Mundo", names: "Mostrar Nombres" },
            en: { reset: "Reset World", names: "Show Names" }
        };

        // Escucha al Portal Sokrateka
        window.addEventListener('message', (event) => {
            if (event.data.tipo === 'SET_LANGUAGE') {
                const lang = event.data.lang;
                const texts = i18n[lang] || i18n.en;
                document.getElementById('btn-reset').textContent = texts.reset;
                document.getElementById('btn-names').textContent = texts.names;
                
                // Si tienes una función propia para traducir los nombres de los países:
                if (typeof setLanguage === 'function') setLanguage(lang);
            }
        });

        function resetWorld() { /* Tu lógica de reset */ }
        function toggleNames() { /* Tu lógica de mostrar nombres */ }
    </script>
</body>
</html>
