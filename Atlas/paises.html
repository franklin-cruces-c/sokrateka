<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mapa Interactivo Global</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="paises.css">
</head>
<body>

<div class="controls" id="controlsContainer">
  <button id="toggleMenu" class="menu-trigger">▼ Menú</button>
  <div id="controlsContent" class="controls-content">
    
    <div class="nav-section">
      <button onclick="window.location.href='../index.html'" style="background: #2ea44f; color: white;">🏠 Inicio</button>
      <div class="nav-grid">
        <button onclick="window.location.href='ciudades.html'">🏙️ Ciudades</button>
        <button onclick="window.location.href='climas.html'">☁️ Climas</button>
      </div>
    </div>

    <hr style="border: 0; border-top: 1px solid #eee; margin: 5px 0;">

    <button id="resetBtn">Reset Mundo</button>
    <button id="toggleNamesBtn">Mostrar nombres</button>
    
    <label for="continentSelect" style="font-size: 11px; font-weight: bold; color: #666;">Filtrar Continente:</label>
    <select id="continentSelect">
      <option value="all">Todo el Mundo</option>
      <option value="Europe">Europa</option>
      <option value="Africa">África</option>
      <option value="Americas">América</option>
      <option value="Asia">Asia</option>
      <option value="Oceania">Oceanía</option>
    </select>
  </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="paises.js"></script>
</body>
</html>
