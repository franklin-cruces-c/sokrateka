<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas Quiz - Modo Desafío</title>
    <link rel="stylesheet" href="banderasJuego.css">
</head>
<body>
    <div class="game-wrapper">
        <div id="setup-screen" class="main-card">
            <h1>🌍 Configura tu Aventura</h1>
            <div class="setup-grid">
                <div class="setup-group">
                    <label>👥 Exploradores</label>
                    <select id="gameMode" class="custom-select">
                        <option value="1">Solo Nicole (1)</option>
                        <option value="2">Duo (2)</option>
                        <option value="3" selected>Equipo Familiar (3)</option>
                    </select>
                </div>
                <div class="setup-group">
                    <label>📍 Continente</label>
                    <select id="continentFilter" class="custom-select">
                        <option value="all">Todo el Mundo</option>
                        <option value="Africa">África</option>
                        <option value="Americas">América</option>
                        <option value="Asia">Asia</option>
                        <option value="Europe">Europa</option>
                        <option value="Oceania">Oceanía</option>
                    </select>
                </div>
                <div class="setup-group">
                    <label>⏱️ Tiempo</label>
                    <select id="timeLimit" class="custom-select">
                        <option value="0">Sin límite</option>
                        <option value="180">3 Minutos</option>
                        <option value="300">5 Minutos</option>
                    </select>
                </div>
                <div class="setup-group">
                    <label>🚩 Banderas</label>
                    <select id="flagLimit" class="custom-select">
                        <option value="10" selected>10</option>
                        <option value="20">20</option>
                        <option value="0">Infinitas</option>
                    </select>
                </div>
            </div>

            <div class="players-grid" id="names-container">
                <div class="input-box p1-border"><label>1°</label><input type="text" id="p1-name" value="Nicole"></div>
                <div class="input-box p2-border"><label>2°</label><input type="text" id="p2-name" value="Nidia"></div>
                <div class="input-box p3-border"><label>3°</label><input type="text" id="p3-name" value="Franklin"></div>
            </div>
            <button id="start-game-btn" class="btn-play">¡Empezar Desafío!</button>
        </div>

        <div id="game-screen" style="display: none;">
            <div class="game-header">
                <div id="timer-display" class="stat-badge">⏱️ 00:00</div>
                <div id="scoreboard" class="scoreboard-layout"></div>
                <div class="header-actions">
                    <button id="btn-save-quit" class="btn-mini save">💾 Guardar</button>
                    <button id="btn-stop" class="btn-mini stop">🛑 Salir</button>
                </div>
            </div>

            <div class="main-card game-box">
                <div class="flag-display"><img id="flag-img" src="" alt="Bandera"></div>
                <div class="options-layout" id="options-grid"></div>
                <div class="action-buttons">
                    <button id="pass-btn" class="btn-secondary">🤝 Ceder Turno</button>
                    <button id="skip-btn" class="btn-secondary">⏭️ Saltar</button>
                    <button id="next-btn" class="btn-play" style="display: none;">Siguiente Bandera ✨</button>
                </div>
                <div id="feedback" class="feedback-msg"></div>
                <div id="flag-counter" class="stat-badge" style="margin-top:15px">🚩 1/10</div>
            </div>
        </div>

        <div id="results-screen" class="main-card" style="display: none;">
            <h2>📊 Resumen de la Aventura</h2>
            <div id="final-stats-container"></div>
            <div class="study-box">
                <h3>💡 Recomendaciones de estudio:</h3>
                <div id="study-recommendations"></div>
            </div>
            <button onclick="location.reload()" class="btn-play" style="margin-top:20px">Jugar de Nuevo</button>
        </div>
    </div>
    <script src="banderasJuego.js"></script>
</body>
</html>
