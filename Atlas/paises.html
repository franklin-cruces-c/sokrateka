<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mapa Interactivo Global</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="paises.css">
</head>
<body>

<div class="controls" id="controlsContainer">
  <button id="toggleMenu" class="menu-trigger">▼ Menú</button>
  <div id="controlsContent" class="controls-content">
    
    <div class="nav-section">
      <label class="label-tiny">Explorar Atlas:</label>
      <select onchange="window.location.href=this.value" class="select-nav">
        <option value="" selected disabled>Seleccionar mapa...</option>
        <option value="index.html">🏠 Inicio Atlas</option>
        <option value="paises.html">🌍 Países</option>
        <option value="capitales.html">🏙️ Capitales</option>
      </select>
    </div>

    <div class="nav-section">
      <label class="label-tiny">Idioma Interfaz:</label>
      <select id="languageSelect" class="select-nav">
        <option value="default">🌐 Defecto</option>
        <option value="es">🇪🇸 Español</option>
        <option value="en">🇺🇸 English</option>
      </select>
    </div>

    <hr class="separator">

    <button id="resetBtn">Reset Mundo</button>
    <button id="toggleNamesBtn">Mostrar nombres</button>
    
    <label for="continentSelect" class="label-tiny">Filtrar Continente:</label>
    <select id="continentSelect" class="select-nav">
      <option value="all">Todo el Mundo</option>
      <option value="Europe">Europa</option>
      <option value="Africa">África</option>
      <option value="Americas">América</option>
      <option value="Asia">Asia</option>
      <option value="Oceania">Oceanía</option>
    </select>

    <button onclick="window.location.href='../index.html'" class="btn-exit">🏠 Salir al Menú Principal</button>
  </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="paises.js"></script>
</body>
</html>
