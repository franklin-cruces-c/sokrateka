<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas Quiz - Aventura de Banderas</title>
    <link rel="stylesheet" href="banderasJuego.css">
</head>
<body>
    <div class="game-container">
        <div id="setup-screen" class="quiz-card">
            <h2>✨ ¡Aprender es una Aventura!</h2>
            <p>Elige cuántos exploradores se unen hoy:</p>
            
            <div class="input-group">
                <select id="gameMode" class="nav-select">
                    <option value="1">1 Explorador</option>
                    <option value="2">Duo de Exploradores</option>
                    <option value="3" selected>Equipo de 3 (¡Toda la familia!)</option>
                </select>
            </div>

            <div class="input-group" id="names-container">
                <input type="text" id="p1-name" placeholder="Explorador 1" value="Franklin">
                <input type="text" id="p2-name" placeholder="Explorador 2" value="Nidia">
                <input type="text" id="p3-name" placeholder="Explorador 3" value="Hija">
            </div>

            <button id="start-game-btn" class="next-btn">¡Empezar a Descubrir!</button>
        </div>

        <div id="game-screen" style="display: none;">
            <div class="header-game">
                <select onchange="window.location.href=this.value" class="nav-select">
                    <option value="" disabled selected>Navegación...</option>
                    <option value="index.html">🏠 Inicio</option>
                    <option value="paises.html">🌍 Mapa Atlas</option>
                </select>
                <button onclick="showStats()" class="btn-stats">📈 Nuestro Progreso</button>
            </div>

            <div id="scoreboard" class="scoreboard-triple"></div>

            <div class="quiz-card main-quiz">
                <div class="flag-container">
                    <img id="flag-img" src="" alt="Bandera por descubrir">
                </div>
                <h2 id="question-text">¿Qué país estamos conociendo?</h2>
                <div id="options-grid" class="options-grid"></div>
                <div id="feedback" class="feedback"></div>
                <button id="next-btn" class="next-btn" style="display: none;">Siguiente Bandera ✨</button>
            </div>
        </div>

        <div id="stats-modal" class="modal" style="display:none;">
            <div class="modal-content">
                <h3>🌟 Camino al Aprendizaje</h3>
                <div id="stats-body"></div>
                <button onclick="closeStats()" class="next-btn">¡Seguir Explorando!</button>
            </div>
        </div>
    </div>
    <script src="banderasJuego.js"></script>
</body>
</html>
