<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas Quiz - Aventura en Familia</title>
    <link rel="stylesheet" href="banderasJuego.css">
</head>
<body>
    <div class="game-wrapper">
        <div id="setup-screen" class="main-card">
            <h1 class="hero-title">✨ ¡Aprender es una Aventura!</h1>
            <p class="hero-subtitle">Configura tu equipo de exploradores:</p>
            
            <div class="setup-controls">
                <select id="gameMode" class="custom-select">
                    <option value="1">1 Explorador</option>
                    <option value="2">Duo de Exploradores</option>
                    <option value="3" selected>Equipo de 3 Exploradores</option>
                </select>
            </div>

            <div class="players-grid" id="names-container">
                <div class="input-box">
                    <label>Explorador 1</label>
                    <input type="text" id="p1-name" value="Nicole" placeholder="Nombre...">
                </div>
                <div class="input-box">
                    <label>Explorador 2</label>
                    <input type="text" id="p2-name" value="Nidia" placeholder="Nombre...">
                </div>
                <div class="input-box">
                    <label>Explorador 3</label>
                    <input type="text" id="p3-name" value="Franklin" placeholder="Nombre...">
                </div>
            </div>

            <button id="start-game-btn" class="btn-play">¡Empezar a Descubrir!</button>

            <div class="admin-panel">
                <span class="admin-label">Gestión de Datos (Portable)</span>
                <div class="admin-btns">
                    <button onclick="saveGame()" class="btn-adm save">💾 Guardar</button>
                    <button onclick="clearStatsOnly()" class="btn-adm stats">📊 Limpiar Puntos</button>
                    <button onclick="resetEverything()" class="btn-adm reset">🗑️ Borrar Todo</button>
                </div>
                <div id="save-status"></div>
            </div>
        </div>

        <div id="game-screen" style="display: none;">
            <div class="game-header">
                <button onclick="location.reload()" class="btn-mini">🏠 Inicio</button>
                <div id="scoreboard" class="mini-score"></div>
                <button onclick="showStats()" class="btn-mini accent">📈 Progreso</button>
            </div>

            <div class="main-card game-box">
                <div class="flag-display">
                    <img id="flag-img" src="" alt="Bandera">
                </div>
                <h2 id="question-label">¿Qué país estamos conociendo?</h2>
                <div id="options-grid" class="options-layout"></div>
                <div id="feedback" class="feedback-msg"></div>
                <button id="next-btn" class="btn-play next-btn" style="display: none;">Siguiente Bandera ✨</button>
            </div>
        </div>

        <div id="stats-modal" class="modal-overlay" style="display:none;">
            <div class="modal-card">
                <h3>🌟 Camino al Aprendizaje</h3>
                <div id="stats-body"></div>
                <button onclick="closeStats()" class="btn-play">Continuar Explorando</button>
            </div>
        </div>
    </div>
    <script src="banderasJuego.js"></script>
</body>
</html>
