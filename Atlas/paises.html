<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Global Interactive Map</title>
    <link rel="stylesheet" href="style_mapa.css">
</head>
<body>
    <div id="map-control-group" class="leaflet-control leaflet-bar">
        <button id="btn-reset" onclick="resetWorld()" title="Reset World">↺</button>
        <button id="btn-names" onclick="toggleNames()" title="Show/Hide Names">🏷️</button>
    </div>

    <div id="map"></div>

    <script>
        // Diccionario de tooltips sincronizado con el portal
        const i18n_tips = {
            es: { reset: "Reiniciar Mundo", names: "Mostrar/Ocultar Nombres" },
            en: { reset: "Reset World", names: "Show/Hide Names" }
        };

        // Escucha al Portal Sokrateka para el idioma global
        window.addEventListener('message', (event) => {
            if (event.data.tipo === 'SET_LANGUAGE') {
                const lang = event.data.lang;
                const tips = i18n_tips[lang] || i18n_tips.en;
                
                // Actualiza el título que sale al pasar el mouse
                document.getElementById('btn-reset').title = tips.reset;
                document.getElementById('btn-names').title = tips.names;
                
                // Si tienes una función propia para traducir los nombres de los países:
                if (typeof setLanguage === 'function') setLanguage(lang);
            }
        });

        // Funciones de acción
        function resetWorld() {
            // Inserta aquí tu lógica original de reset
            console.log("Reiniciando mundo...");
        }

        function toggleNames() {
            // Inserta aquí tu lógica original de mostrar/ocultar nombres
            console.log("Cambiando visibilidad de nombres...");
        }
    </script>
</body>
</html>
