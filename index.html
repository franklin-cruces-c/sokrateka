<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sokrateka</title>
    <link rel="stylesheet" href="style_portal.css">
</head>
<body>
    <button id="btn-abrir" class="btn-float" style="display: none;">☰</button>

    <div id="contenedor-principal" class="menu-activo">
        <aside id="sidebar-menu">
            <div class="sidebar-card">
                <h2>🎓 Sokrateka</h2>
                <button id="btn-cerrar">✖</button>
                <nav>
                    <p class="seccion">CONFIGURACIÓN GLOBAL</p>
                    <select id="global-lang" class="portal-select" onchange="notificarIdioma(this.value)">
                        <option value="es">Español 🇪🇸</option>
                        <option value="en">English 🇺🇸</option>
                    </select>
                    <p class="seccion">GEOGRAFÍA</p>
                    <button onclick="ir('Atlas/paises.html')">🌍 Mapa Atlas</button>
                    <button onclick="ir('Atlas/banderasJuego.html')">🚩 Juego Banderas</button>
                </nav>
            </div>
        </aside>
        <main id="contenido-app">
            <iframe id="visor" src="Atlas/paises.html" frameborder="0"></iframe>
        </main>
    </div>

    <script>
        const visor = document.getElementById('visor');
        const selectLang = document.getElementById('global-lang');

        function ir(url) {
            visor.src = url;
            visor.onload = () => notificarIdioma(selectLang.value);
        }

        function notificarIdioma(lang) {
            visor.contentWindow.postMessage({ tipo: 'SET_LANGUAGE', lang: lang }, '*');
        }

        document.getElementById('btn-cerrar').onclick = () => {
            document.getElementById('contenedor-principal').classList.replace('menu-activo', 'menu-oculto');
            document.getElementById('btn-abrir').style.display = 'block';
        };
        document.getElementById('btn-abrir').onclick = () => {
            document.getElementById('contenedor-principal').classList.replace('menu-oculto', 'menu-activo');
            document.getElementById('btn-abrir').style.display = 'none';
        };
    </script>
</body>
</html>
