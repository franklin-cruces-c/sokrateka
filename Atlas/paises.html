<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mapa Interactivo Global</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="paises.css">
</head>
<body>

<div class="controls" id="controlsContainer">
  <button id="toggleMenu" class="menu-trigger">▼ Menú</button>
  <div id="controlsContent" class="controls-content">
    <button id="resetBtn">Reset Mundo</button>
    <button id="toggleNamesBtn">Mostrar nombres</button>
    <label for="continentSelect" style="font-size: 12px; font-weight: bold; margin-top: 5px; color: #444;">Filtrar Continente:</label>
    <select id="continentSelect">
      <option value="all">Todo el Mundo</option>
      <option value="Europe">Europa</option>
      <option value="Africa">África</option>
      <option value="Americas">América</option>
      <option value="Asia">Asia</option>
      <option value="Oceania">Oceanía</option>
    </select>
  </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="paises.js"></script>
</body>
</html>
