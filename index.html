<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sokrateka - Panel de Control</title>
    <link rel="stylesheet" href="style_portal.css">
</head>
<body>
    <div id="main-layout" class="sidebar-visible">
        <aside id="sidebar">
            <div class="sidebar-top">
                <h2>🎓 Sokrateka</h2>
                <button id="btn-toggle" title="Cerrar Menú">◀</button>
            </div>
            
            <nav class="menu-nav">
                <div class="category">🌍 Geografía</div>
                <button onclick="cargarApp('Atlas/paises.html', 'Atlas Oficial')">Atlas Mapa</button>
                <button onclick="cargarApp('Atlas/banderasJuego.html', 'Juego de Banderas')">Banderas</button>
                <button onclick="cargarApp('Atlas.dev/banderasJuego.html', 'QA Banderas')" class="qa-btn">🛠️ Atlas QA</button>

                <div class="category">📐 Matemáticas</div>
                <button onclick="cargarApp('Pitagoras/index.html', 'Pitágoras')">Pitágoras</button>
            </nav>
        </aside>

        <main id="main-content">
            <header class="content-header">
                <button id="btn-open" style="display: none;">☰ Menú</button>
                <h3 id="app-title">Bienvenido a Sokrateka</h3>
            </header>
            <section class="iframe-container">
                <iframe id="app-frame" src="about:blank"></iframe>
            </section>
        </main>
    </div>

    <script>
        const layout = document.getElementById('main-layout');
        const btnToggle = document.getElementById('btn-toggle');
        const btnOpen = document.getElementById('btn-open');
        const frame = document.getElementById('app-frame');
        const title = document.getElementById('app-title');

        // Función para cambiar de aplicación
        function cargarApp(url, nombre) {
            frame.src = url;
            title.textContent = nombre;
        }

        // Lógica para contraer/expandir
        btnToggle.onclick = () => {
            layout.classList.replace('sidebar-visible', 'sidebar-hidden');
            btnOpen.style.display = 'block';
        };

        btnOpen.onclick = () => {
            layout.classList.replace('sidebar-hidden', 'sidebar-visible');
            btnOpen.style.display = 'none';
        };
    </script>
</body>
</html>
